<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TALON: The Last Holder</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #555; color: white; border: none; }
    </style>
</head>
<body>
    <h1>TALON: The Last Holder</h1>
    <p>Le Roi actuel : <span id="king">Chargement...</span></p>
    <button id="payButton">Devenir le Roi (0.001 ETH)</button>

    <script>
        const TREASURY_ADDRESS = "VOTRE_ADRESSE_BASE_ICI"; // <-- REMPLACEZ PAR VOTRE ADRESSE
        
        document.getElementById('payButton').addEventListener('click', async () => {
            if (!window.ethereum) return alert("Veuillez installer MetaMask ou un wallet");
            
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();

            const tx = await signer.sendTransaction({
                to: TREASURY_ADDRESS,
                value: ethers.utils.parseEther("0.001")
            });

            alert("Transaction envoyée ! Attendez la confirmation sur Basescan.");
            await tx.wait();
            alert("Succès ! Vous êtes en lice pour être le Roi.");
        });
    </script>
</body>
</html>
