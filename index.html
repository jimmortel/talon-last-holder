<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALON: The Last Holder</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000; 
            color: #fff; 
            text-align: center; 
            padding: 50px 20px; 
        }
        h1 { color: #f9d423; }
        #king { font-weight: bold; color: #00ffcc; word-break: break-all; }
        button { 
            margin-top: 30px;
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 8px;
        }
        button:hover { background: #444; }
    </style>
</head>
<body>
    <h1>TALON: The Last Holder</h1>
    <p>Le Roi actuel : <span id="king">Chargement...</span></p>
    <button id="payButton">Devenir le Roi (0.001 ETH)</button>

    <script>
        // Votre adresse intégrée
        const TREASURY_ADDRESS = "0x872bD846596Cc1aEde8Fd800997d242e3473fA83";
        
        document.getElementById('payButton').addEventListener('click', async () => {
            if (!window.ethereum) return alert("Veuillez installer MetaMask ou utiliser un navigateur avec wallet intégré.");
            
            try {
                // Demander la connexion au wallet
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();

                // Préparation de la transaction
                const tx = await signer.sendTransaction({
                    to: TREASURY_ADDRESS,
                    value: ethers.utils.parseEther("0.001") // Prix du ticket en ETH
                });

                alert("Transaction envoyée ! Attendez la confirmation sur la blockchain.");
                await tx.wait();
                alert("Succès ! Votre participation est enregistrée.");
            } catch (error) {
                console.error("Erreur :", error);
                alert("Erreur lors de la transaction : " + (error.message || error));
            }
        });
    </script>
</body>
</html>
