<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TALON: The Last Holder</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000; color: #fff; text-align: center; 
            margin: 0; padding: 10px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; justify-content: center;
        }
        h1 { color: #f9d423; font-size: 22px; margin: 5px 0; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #f9d423; margin-bottom: 5px; object-fit: cover; }
        .description { color: #ccc; font-size: 13px; margin: 10px 0; max-width: 300px; line-height: 1.3; }
        .highlight { color: #f9d423; font-weight: bold; }
        .btn { 
            display: inline-block; padding: 15px 0; font-size: 16px; 
            background: #f9d423; color: #000; font-weight: bold; text-decoration: none; 
            border-radius: 10px; width: 100%; max-width: 300px;
            margin-bottom: 10px;
        }
        .btn-secondary { background: transparent; color: #f9d423; border: 1px solid #f9d423; padding: 10px 0; font-size: 13px; max-width: 300px; }
        .explorer-link { color: #f9d423; font-size: 11px; margin-bottom: 10px; text-decoration: underline; }
        p { margin: 5px 0; }
    </style>
</head>
<body>
    <img src="IMG_20260606_230230.png" class="avatar" alt="Logo Talon">
    
    <h1>TALON: The Last Holder</h1>
    <p style="font-size: 14px;">Current King: Waiting...</p>
    
    <a href="ethereum:0x872bD846596Cc1aEde8Fd800997d242e3473fA83?value=1000000000000000" class="btn">
        BECOME THE KING (0.001 ETH)
    </a>

    <div class="description">
        <p>The <span class="highlight">Last Holder</span> takes the crown!</p>
        <p>Your transaction is recorded on-chain.</p>
    </div>

    <a href="https://etherscan.io/address/0x872bD846596Cc1aEde8Fd800997d242e3473fA83" class="explorer-link">
        View Pool Activity
    </a>

    <a href="https://eagle-nest-eight.vercel.app/" class="btn btn-secondary">
        Go to Claim App
    </a>
</body>
</html>
